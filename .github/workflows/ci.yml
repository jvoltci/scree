name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: macos-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install scree with dev + torch extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,torch]"

      - name: Run tests
        run: pytest tests/ -v

      - name: Run quickstart example
        run: python examples/01_quickstart.py

      - name: Run no-pad transformer example
        run: python examples/02_no_pad_transformer.py

      - name: Run memory benchmark
        run: python benchmarks/bench_memory.py
