site_name: scree
site_description: A cross-framework ragged tensor primitive for variable-length sequence data
site_url: https://jvoltci.github.io/scree/
repo_url: https://github.com/jvoltci/scree
repo_name: jvoltci/scree
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Overview: index.md
  - Getting started: getting-started.md
  - Concepts: concepts.md
  - API reference: api.md
  - Bridges & migration: bridges.md
  - Kernels: kernels.md
  - Benchmarks: benchmarks.md
  - Architecture: architecture.md
  - FAQ: faq.md
  - Launch blog (draft): launch-blog-draft.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jvoltci/scree
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/scree/
